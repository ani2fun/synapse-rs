name: Build, Push, and Promote go-judge

# Synapse's own sandbox image: the stock criyle/go-judge plus every toolchain the execution
# context's `Language` enum runs. Rebuilds only when the runner definition changes — the
# sandbox evolves independently of the app image.
#
# MOVED HERE 2026-07-18, and it had to be. This lived in the Scala repo, which is being
# archived — and archiving disables Actions, so the sandbox that production uses to run every
# submission could never have been rebuilt again (a toolchain bump, a CVE, anything). The
# sandbox belongs with the app that depends on it.

on:
  push:
    branches:
      - main
    paths:
      - 'runner/go-judge/**'
      - '.github/workflows/go-judge-build-push-promote.yml'
      - '.github/workflows/_build-push-promote.yml'
  workflow_dispatch:

concurrency:
  group: synapse-go-judge-main
  cancel-in-progress: true

# HISTORY, kept because the failure mode is not guessable from the code (fixed 2026-07-19).
#
# Its first two runs failed at push with:
#
#   denied: permission_denied: write_package
#     → ghcr.io/ani2fun/synapse-go-judge
#
# It was NOT the `packages: write` escalation that broke the app release — that block is
# present below and was always correct, and the app image pushed to ghcr.io/ani2fun/synapse-rs
# from this same repo with this same token throughout. The difference was package-level:
# `synapse-rs` was created BY this repository so this repository could write it, while
# `synapse-go-judge` was created by the SCALA repo and its GHCR access list did not follow the
# move in aaf8e06. Nothing in a workflow file can express that, which is why it is written here.
#
# Fixed by granting this repository access on the package itself:
#   Packages → synapse-go-judge → Package settings → Manage Actions access
#     → Add repository → ani2fun/synapse
#
# `Write` is sufficient (push + pull, which is all this workflow does). Anything broader also
# lets a workflow here delete the package — and production pulls `:latest` from it, so deletion
# would take the sandbox down AND destroy the rollback target.
#
# Verified: run 29678821643 pushed a new image (digest 30857ba7…, replacing the Scala repo's
# f4196f8e… from 2026-07-13) and promoted it into ani2fun/infra. The GOJUDGE_IT suites are now
# wired into ci.yml against this image.
permissions:
  contents: read
  packages: write

jobs:
  call:
    uses: ./.github/workflows/_build-push-promote.yml
    with:
      image_repo: ghcr.io/ani2fun/synapse-go-judge
      dockerfile: runner/go-judge/Dockerfile
      # Self-contained apt-install image — narrow the context so the whole repo
      # isn't shipped to buildx for a toolchain build.
      context: runner/go-judge
      buildx_cache_scope: synapse-go-judge
      infra_kustomization_file: deploy/apps/synapse-go-judge/overlays/prod/kustomization.yaml
      commit_message: "chore(synapse-go-judge): promote image to"
    secrets: inherit
