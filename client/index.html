<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>synapse-rs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Literata:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <!-- The theme bootstrap (oracle verbatim): .dark on <html> BEFORE first paint - stored
         choice wins, else the OS preference. The CSP allows this inline script by design. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var dark = t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
