name: ci

on:
  push:
    branches: [main]
    tags: ["step-*"]
  pull_request:

jobs:
  # ── The convention gate runs FIRST — it needs nothing but grep/find/wc, so a
  # ── purity or file-cap breach fails in seconds, before any toolchain install.
  conventions:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: dev-tools/check-conventions.sh

  # ── What changed (step 48) ────────────────────────────────────────────────────
  # Since step 44 a green push to main ships to the cluster unattended, and there was no
  # paths filter anywhere — so a commit that only edited a chapter still built an image,
  # pushed it to ghcr, patched ani2fun/infra and rolled production. Harmless per commit;
  # wasteful as a habit, and it makes the deploy history lie about what actually changed.
  #
  # This job answers one question for `release` below. It deliberately does NOT gate any
  # test job: a docs commit must still clear conventions, clippy, the suites and the bundle
  # budget. Only the SHIPPING is skipped.
  #
  # Plain git rather than a paths-filter action, for the same reason check-conventions.sh is
  # grep/find/wc: the question is one `git diff | grep -v`, and the glob route is a trap. A
  # filter of ['**', '!docs/**'] reads like set subtraction but picomatch ORs its patterns —
  # '**' matches the doc, '!docs/**' matches everything else, so the filter is true for every
  # file and the gate silently never fires. (Verified against picomatch before writing this.)
  # The inverse — a positive allow-list of code paths — fails CLOSED: one forgotten directory
  # and a real change stops shipping with nothing to say so. Subtraction is the safe direction.
  changes:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          # Anything that is not a push, and any base we cannot resolve (a new branch, a force
          # push, a shallow fetch), answers "code changed" — see the fail-open note on release.
          if [ "${{ github.event_name }}" != "push" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "base unresolvable or not a push — assuming code changed"
            exit 0
          fi
          changed=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          echo "changed files:"; printf '%s\n' "$changed" | sed 's/^/  /'
          rest=$(printf '%s\n' "$changed" \
            | grep -vE '^docs/|\.md$|^dev-tools/synapse-rs\.insomnia\.json$' || true)
          if [ -n "$rest" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "shipping — non-docs changes:"; printf '%s\n' "$rest" | sed 's/^/  /'
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "docs-only — the release job will stand down"
          fi

  # ── Supply chain (step 45) ────────────────────────────────────────────────────
  # `cargo test` proves the code we wrote; this proves the 407 crates we did not.
  # It runs in parallel with the toolchain jobs (it needs no rustc) and gates the
  # release, because since step 44 a green push ships to the cluster unattended.
  supply-chain:
    timeout-minutes: 15
    needs: conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # All four: advisories (RustSec + yanked) · bans (no openssl, no
          # third-party wildcards) · licenses (the permissive allow-list) ·
          # sources (crates.io only). Targets and `all-features` are set in
          # deny.toml's [graph] — they are not CLI arguments.
          command: check

  build-test:
    timeout-minutes: 30
    needs: conventions
    runs-on: ubuntu-latest
    # The Postgres IT was env-gated and therefore ran nowhere: RS001 promised
    # testcontainers, the reality was "hope someone remembers locally". That matters more
    # here than in most codebases because sqlx is used through runtime `query()` rather than
    # the compile-time-checked `query!` macros — so with the IT skipped, NOTHING validated
    # the SQL. A schema-breaking change would have reached production green.
    #
    # 17-alpine matches docker-compose and prod. `synapse_rs` is the DEDICATED database, never
    # the oracle's Liquibase-managed `synapse` — the ITs create and delete rows.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse_rs
        ports: ["5432:5432"]
        # Without the health gate the suite races the server's first accept and fails
        # intermittently — the worst kind of CI, the kind people learn to re-run.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_IT: 1
      DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (the anti-pattern gate — warnings are errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: tests (unit + integration + contract lock + the Postgres IT)
        run: cargo test --workspace
      - name: prove the Postgres IT actually RAN (a skip reports green)
        # The gated ITs print "skipped (set POSTGRES_IT=1 …)" and still pass, which is the
        # standard Rust workaround for having no native skip — and the reason this gap went
        # unnoticed for so long. Assert on a test that only exists behind the gate, so a
        # broken service block fails loudly instead of silently reverting to the old state.
        run: |
          cargo test --workspace --test postgres_it -- --nocapture 2>&1 | tee /tmp/pg.log
          if grep -q "skipped (set POSTGRES_IT" /tmp/pg.log; then
            echo "::error::the Postgres IT SKIPPED — the service or DATABASE_URL is wrong"
            exit 1
          fi
          grep -qE "test result: ok\. [1-9]" /tmp/pg.log \
            || { echo "::error::the Postgres IT ran no tests"; exit 1; }

  # ── The live sandbox (step 45) ────────────────────────────────────────────────
  # GOJUDGE_IT was env-gated and, like the Postgres suite, therefore ran nowhere: the
  # adapter that turns our wire format into go-judge calls — recipes, the Java rewriter,
  # the ns→s and bytes→KiB conversions, "Accepted with a nonzero exit is a RuntimeError" —
  # was only ever checked against a hand-written stub. A stub agrees with whatever we
  # believed when we wrote it.
  #
  # This runs on every push rather than behind a paths filter, and costs no wall-clock:
  # it starts alongside build-test, which takes several minutes on its own, so the pull
  # and the three tests finish well inside that window.
  #
  # go-judge needs --privileged (it sandboxes with namespaces and cgroups), which Actions
  # SERVICE containers cannot provide — hence `docker run` in a step rather than a
  # `services:` block like Postgres.
  gojudge-it:
    timeout-minutes: 30
    needs: conventions
    runs-on: ubuntu-latest
    env:
      GOJUDGE_IT: 1
      EXECUTOR_URL: http://localhost:5150
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: start the real sandbox
        run: |
          docker run -d --privileged --name go-judge \
            -p 5150:5050 ghcr.io/ani2fun/synapse-go-judge:latest
          # go-judge answers /version once it is listening; poll rather than sleep so a
          # slow cold start does not turn into a flaky suite.
          for i in $(seq 1 60); do
            curl -sf http://localhost:5150/version >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:5150/version || {
            echo "::error::go-judge never became ready"; docker logs go-judge; exit 1; }
      - name: sandbox ITs (the REAL go-judge, not a stub)
        run: cargo test --test go_judge_it --test java_tracer_it -- --test-threads=1
      - name: prove they RAN (a skip reports green)
        # Same trap as the Postgres suite: the gate prints "skipped" and passes. Assert on
        # the absence of that line, or a broken EXECUTOR_URL silently reverts to no coverage.
        run: |
          cargo test --test go_judge_it -- --nocapture 2>&1 | tee /tmp/gj.log
          if grep -q "skipped (set GOJUDGE_IT" /tmp/gj.log; then
            echo "::error::the go-judge IT SKIPPED — the sandbox or EXECUTOR_URL is wrong"
            exit 1
          fi
      - if: always()
        run: docker rm -f go-judge || true

  client-build:
    timeout-minutes: 30
    needs: conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.126
      - name: wasm-opt (binaryen, upstream — NOT apt)
        # apt ships binaryen 108, from 2022. Its `wasm-opt -Oz` MISCOMPILES a module built by
        # the current toolchain: the result loads and then dies with
        # `WebAssembly.Table.grow(): failed to grow table by 4`, so the app never mounts. CI
        # built that artifact from step 35 onward and nothing ever executed it — the bundle
        # budget measured a binary that could not run. The e2e suite is what finally ran it.
        #
        # The Dockerfile has pinned upstream binaryen since step 35 for a size reason (108
        # leaves ~270 KiB gz on the table); correctness turns out to be the bigger one. The
        # version is READ FROM the Dockerfile so the two can never drift — prod and CI must
        # optimise with the same compiler.
        run: |
          set -euo pipefail
          version=$(grep -oP 'ARG BINARYEN_VERSION=\K[0-9]+' Dockerfile)
          echo "binaryen $version (from Dockerfile)"
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/version_${version}/binaryen-version_${version}-x86_64-linux.tar.gz" \
            | sudo tar -xz -C /usr/local --strip-components=1
          wasm-opt --version
      - name: npm ci
        working-directory: client
        run: npm ci
      - name: vitest (the TS-island suites)
        working-directory: client
        run: npm test
      - name: wasm + vite production build
        working-directory: client
        run: npm run build
      - name: bundle budget (700 KiB gz critical path)
        run: dev-tools/check-bundle-budget.sh

  # ── End-to-end smoke (step 52) ────────────────────────────────────────────────
  # Every "Verified" section in 51 chapters was a human in a browser tab, and the classes of
  # bug that survived that — a drawer under the fixed header for nine steps, a palette rendering
  # at the page's bottom-left for a release — are exactly the ones a machine notices instantly.
  #
  # It runs against the PRODUCTION-SHAPED serve (the real server over a built dist), not Vite:
  # per-page meta, cache headers and the security-header stack only exist on that path, and
  # step 19's chapter records that dev never reproduces CSP breakage.
  #
  # Content comes from e2e/fixture-content, never ../synapse-content — CI has no content
  # checkout, and pinning a smoke suite to another repository means an edit there can turn this
  # one red.
  e2e:
    timeout-minutes: 30
    needs: conventions
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse_rs
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SYNAPSE_DATABASE_URL: postgres://synapse:synapse@localhost:5432/synapse_rs
      SYNAPSE_ROOT: e2e/fixture-content
      STATIC_ROOT: client/dist
      SYNAPSE_PORT: 8280
      E2E_BASE_URL: http://localhost:8280
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.126
      - name: wasm-opt (binaryen, upstream — NOT apt)
        # apt ships binaryen 108, from 2022. Its `wasm-opt -Oz` MISCOMPILES a module built by
        # the current toolchain: the result loads and then dies with
        # `WebAssembly.Table.grow(): failed to grow table by 4`, so the app never mounts. CI
        # built that artifact from step 35 onward and nothing ever executed it — the bundle
        # budget measured a binary that could not run. The e2e suite is what finally ran it.
        #
        # The Dockerfile has pinned upstream binaryen since step 35 for a size reason (108
        # leaves ~270 KiB gz on the table); correctness turns out to be the bigger one. The
        # version is READ FROM the Dockerfile so the two can never drift — prod and CI must
        # optimise with the same compiler.
        run: |
          set -euo pipefail
          version=$(grep -oP 'ARG BINARYEN_VERSION=\K[0-9]+' Dockerfile)
          echo "binaryen $version (from Dockerfile)"
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/version_${version}/binaryen-version_${version}-x86_64-linux.tar.gz" \
            | sudo tar -xz -C /usr/local --strip-components=1
          wasm-opt --version
      - name: build the client
        working-directory: client
        run: npm ci && npm run build
      # Chromium is ~130 MB and rust-cache does not cover it — without this the browser is
      # re-downloaded on every run.
      - name: cache the browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}
      - name: install playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium
      - name: smoke
        # `set -o pipefail` is LOAD-BEARING. A pipeline's exit status is its LAST command's, and
        # `tee` always succeeds — so without this, a failing Playwright run reports success and
        # the job that gates the release cannot fail. That is not hypothetical: the first run of
        # this job went green with "4 failed, 3 passed" in its own log.
        run: |
          set -o pipefail
          dev-tools/e2e 2>&1 | tee /tmp/e2e.log
      - name: prove the suite actually RAN (an empty run reports green)
        # Same trap as the Postgres and go-judge gates: zero tests executed is a pass. Assert a
        # positive count, so a bad testDir or a filter typo fails loudly instead of protecting
        # nothing.
        #
        # The failure check is NOT redundant with pipefail above. This guard originally matched
        # only "N passed" and was perfectly happy with "4 failed, 3 passed" — a guard that reads
        # the right line and asks the wrong question. Both halves now have to hold.
        run: |
          grep -qE "[1-9][0-9]* passed" /tmp/e2e.log \
            || { echo "::error::the e2e suite ran no tests"; exit 1; }
          if grep -qE "[0-9]+ failed" /tmp/e2e.log; then
            echo "::error::the e2e suite reported failures"
            exit 1
          fi
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: e2e/test-results/
          retention-days: 7

  # The image must always BUILD (the budget gate runs inside it). On PRs that is a smoke
  # build and nothing more; on main the `release` job below does the same build for real, so
  # this one steps aside rather than building the image twice.
  docker:
    timeout-minutes: 30
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    needs: [conventions, build-test, client-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker smoke build
        run: docker buildx build --file Dockerfile --tag synapse-rs:ci .

  # ── RELEASE (automatic since 2026-07-18) ──────────────────────────────────────
  # Every push to main that clears the gates above ships: build → ghcr → patch the image tag
  # in ani2fun/infra → ArgoCD rolls it out. No dispatch, no button.
  #
  # It lives HERE, as a job, rather than in a workflow of its own precisely so it can say
  # `needs:` — the gates and the release have to be one dependency graph or they race, and a
  # release that starts before clippy finishes is not gated at all. `workflow_run` would have
  # given the ordering but not the SHA: in that context `github.sha` is the default branch's
  # tip, not the commit that triggered it, so the image tag and the promoted tag could
  # disagree under two quick pushes.
  #
  # Tags are excluded (`refs/heads/main` only): `step-*` tags point at a commit main has
  # already shipped, and releasing again would rebuild the same tree under a second SHA.
  #
  # Docs-only commits are excluded too (step 48), and the condition is written to FAIL OPEN on
  # the OUTPUT: `!= 'false'` rather than `== 'true'`, so an empty or unexpected value from the
  # filter still ships. This gate is an optimisation, not a safety control — shipping an
  # identical tree costs five minutes, whereas silently NOT shipping a code change would leave
  # main and production disagreeing with nothing to say so. (A `changes` job that outright
  # FAILS still blocks the release, like every other entry in `needs` — that is a red run, and
  # a red run should not deploy.)
  release:
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main'
      && needs.changes.outputs.code != 'false'
    needs: [changes, conventions, supply-chain, build-test, client-build, gojudge-it, e2e]
    permissions:
      contents: read
      packages: write
    # Never cancel a run mid-promote: it can push the image and die before patching infra,
    # leaving the cluster on the previous tag with no signal that anything was missed.
    concurrency:
      group: synapse-rs-release
      cancel-in-progress: false
    uses: ./.github/workflows/_build-push-promote.yml
    with:
      image_repo: ghcr.io/ani2fun/synapse-rs
      # The in-place cutover (2026-07-18): the Rust app owns the EXISTING
      # `deploy/apps/synapse/` unit — same ArgoCD app, Service, Ingress, TLS and hostname —
      # so promotes patch that overlay rather than a synapse-rs one that would duplicate them.
      infra_kustomization_file: deploy/apps/synapse/overlays/prod/kustomization.yaml
      commit_message: "chore(synapse): promote image to"
    secrets: inherit
