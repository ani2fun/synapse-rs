# The release pipeline: build the production image → ghcr → promote in the infra repo.
# MANUAL-ONLY for now (user decision 2026-07-17: do NOT deploy to k3s yet — bug fixes
# first). The push-to-main trigger joins at cutover:
#   on:
#     push:
#       branches: [main]
name: build-push-promote

on:
  workflow_dispatch:

concurrency:
  group: synapse-rs-main
  cancel-in-progress: true

# REQUIRED — and the reason this workflow failed at startup on its first real invocation.
# The repository's default workflow permission is `read`, and a called workflow's job-level
# `permissions:` can only NARROW the caller's token, never widen it. Without this block the
# engine's `packages: write` is an escalation, so GitHub rejects the run before any job starts:
# a bare `startup_failure` with no logs and no annotation to read.
permissions:
  contents: read
  packages: write

jobs:
  release:
    uses: ./.github/workflows/_build-push-promote.yml
    with:
      image_repo: ghcr.io/ani2fun/synapse-rs
      # The in-place cutover (2026-07-18): the Rust app takes over the EXISTING
      # `deploy/apps/synapse/` unit — same ArgoCD app, Service, Ingress, TLS and hostname — so
      # promotes patch that overlay rather than a synapse-rs one that would duplicate them.
      infra_kustomization_file: deploy/apps/synapse/overlays/prod/kustomization.yaml
      commit_message: "chore(synapse): promote image to"
    secrets: inherit
